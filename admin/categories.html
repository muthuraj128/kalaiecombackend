<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories | Admin</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <main class="app">
    <section class="dashboard">
      <aside class="sidebar card" id="adminSidebar">
        <div class="brand-block">
          <p class="brand-caption">Control Center</p>
          <h2 class="brand-title">Muthu Gadgets</h2>
        </div>

        <nav class="sidebar-tabs" aria-label="Admin sections">
          <a href="./overview.html" class="nav-link">Overview</a>
          <a href="./categories.html" class="nav-link active">Category Manager</a>
          <a href="./products.html" class="nav-link">Product Manager</a>
        </nav>

        <div class="sidebar-footer">
          <p class="muted sidebar-user" id="adminIdentity"></p>
          <button id="logoutBtn" class="btn btn-outline full-btn" type="button">Logout</button>
        </div>
      </aside>

      <div class="dashboard-content">
        <header class="dashboard-header card">
          <div>
            <p class="header-kicker">Catalog Structure</p>
            <h1>Category Manager</h1>
            <p class="muted compact">Create and manage product categories used in the product form.</p>
          </div>
          <button class="btn btn-outline admin-menu-toggle" id="adminMenuToggle" type="button" aria-expanded="false" aria-controls="adminSidebar">Menu</button>
        </header>

        <section class="panel-layout two-col">
          <section class="card form-card">
            <div class="panel-title-row">
              <h2>Category Form</h2>
              <button id="refreshCategories" class="btn btn-outline" type="button">Refresh</button>
            </div>

            <form id="categoryForm" class="form-grid">
              <input type="hidden" id="categoryId">
              <label class="full">Category Name<input type="text" id="categoryName" required></label>
              <label class="full checkbox-label">
                <input type="checkbox" id="categoryActive" checked>
                Active
              </label>
              <div class="full actions-row">
                <button type="submit" class="btn btn-primary">Save Category</button>
                <button type="button" id="clearCategoryForm" class="btn btn-outline">Clear</button>
              </div>
            </form>

            <p id="categoryMessage" class="message"></p>
          </section>

          <section class="card list-card">
            <div class="panel-title-row">
              <h2>Categories</h2>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Active</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="categoriesTableBody"></tbody>
              </table>
            </div>
          </section>
        </section>
      </div>
    </section>
  </main>

  <script type="module" src="./js/common.js"></script>
  <script type="module" src="./js/categories.js"></script>
</body>

</html>
